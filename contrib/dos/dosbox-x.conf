# DOSBox-X config for the xpar self-check wrapper.
# @PWD@ / @OUT@ are sed-expanded by the wrapper (see Makefile.am).
[sdl]
output=surface

[dosbox]
memsize=32

[cpu]
cycles=max

[dos]
lfn=true
ver=7.1

[mixer]
nosound=true

[speaker]
pcspeaker=false
tandy=off
disney=false
ps1audio=off

[ide, primary]
int13fakeio=false
int13fakev86io=false

[autoexec]
mount d "@PWD@"
mount e "@OUT@"
d:
xpar.exe @e:\args.rsp > e:\stdout.out
if errorlevel 1 echo FAIL > e:\ec.txt
if not errorlevel 1 echo OK > e:\ec.txt
exit
