name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - '*.*'

jobs:
  ghrelease:
    name: Publish sources on GitHub Release
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Configure
        run: |
          ./bootstrap && ./configure
          sudo apt update
          sudo apt install bzip3 -y
          bzip3 --version
      - name: Build source packages
        run: |
          make update-ChangeLog
          make dist-gzip
          make dist-zip
          gzip -dk xpar-${{ github.ref_name }}.tar.gz
          bzip3 xpar-${{ github.ref_name }}.tar
          bzip2 -k xpar-${{ github.ref_name }}.tar
          zstd -k xpar-${{ github.ref_name }}.tar
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            xpar-${{ github.ref_name }}.tar
            xpar-${{ github.ref_name }}.tar.bz2
            xpar-${{ github.ref_name }}.tar.bz3
            xpar-${{ github.ref_name }}.tar.gz
            xpar-${{ github.ref_name }}.tar.zst
            xpar-${{ github.ref_name }}.zip
      - name: Upload source package artifact
        uses: actions/upload-artifact@v4
        with:
          name: xpar-${{ github.ref_name }}
          path: xpar-${{ github.ref_name }}.tar.gz
  binaries:
    name: Publish Binaries on GitHub Release
    needs: [ ghrelease ]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - [ "x86_64", "CC=x86_64-w64-mingw32-gcc --host x86_64-w64-mingw32 --enable-static --enable-lto --enable-x86-64", "gcc-mingw-w64-x86-64" ]
          - [ "i686", "CC=i686-w64-mingw32-gcc --host i686-w64-mingw32 --enable-static --enable-lto", "gcc-mingw-w64-i686" ]
          - [ "i686-w95", "CC=i686-w64-mingw32-gcc --host i686-w64-mingw32 --enable-static --enable-lto --with-windows-target=win95", "gcc-mingw-w64-i686" ]
    steps:
      - name: Download source package artifact
        uses: actions/download-artifact@v4
        with:
          name: xpar-${{ github.ref_name }}
      - name: Extract source package
        run: tar --strip-components=1 -xf xpar-${{ github.ref_name }}.tar.gz
      - name: Install cross-compile dependencies
        if: ${{ matrix.target[2] }}
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.target[2] }}
      - name: Install nasm
        run: sudo apt-get install nasm -y
      - name: Configure
        run: ./configure --bindir=/ --program-suffix=-${{ matrix.target[0] }} ${{ matrix.target[1] }}
      - name: Make
        run: |
          make
          make DESTDIR=$(pwd)/output install-exec
      - name: Publish binary
        uses: softprops/action-gh-release@v2
        with:
          files: |
            output/xpar-${{ matrix.target[0] }}*
  dos:
    name: Publish DOS binary on GitHub Release
    needs: [ ghrelease ]
    runs-on: ubuntu-latest
    env:
      DJGPP_RELEASE: "v3.4"
      DJGPP_GCC: "1220"
      # inject-errors builds for the host; keep CC_FOR_BUILD off the cross-gcc.
      CC_FOR_BUILD: /usr/bin/gcc
      CFLAGS_FOR_BUILD: -O2
    steps:
      - name: Download source package artifact
        uses: actions/download-artifact@v4
        with:
          name: xpar-${{ github.ref_name }}
      - name: Extract source package
        run: tar --strip-components=1 -xf xpar-${{ github.ref_name }}.tar.gz
      - name: Install DJGPP cross-toolchain
        run: |
          curl -fL -o /tmp/djgpp.tar.bz2 \
            "https://github.com/andrewwutw/build-djgpp/releases/download/${DJGPP_RELEASE}/djgpp-linux64-gcc${DJGPP_GCC}.tar.bz2"
          tar -xjf /tmp/djgpp.tar.bz2 -C "$HOME"
          echo "$HOME/djgpp/bin" >> $GITHUB_PATH
          exe2coff=$(find "$HOME/djgpp" -name exe2coff -type f -print -quit)
          if [ -z "$exe2coff" ]; then
            echo "exe2coff not found in the DJGPP tarball -- aborting" >&2
            exit 1
          fi
          ln -sf "$exe2coff" "$HOME/djgpp/bin/exe2coff"
      - name: Install CWSDPMI (for bundling into the .exe stub)
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip
          curl -fL -o /tmp/csdpmi.zip http://www.delorie.com/pub/djgpp/current/v2misc/csdpmi7b.zip
          unzip -j -d "$HOME/csdpmi" /tmp/csdpmi.zip 'bin/CWSDSTUB.EXE'
          echo "CWSDSTUB=$HOME/csdpmi/CWSDSTUB.EXE" >> $GITHUB_ENV
      - name: Configure
        run: |
          ./configure --host=i586-pc-msdosdjgpp --disable-x86_64 \
                      --bindir=/ --program-suffix=-dos \
                      CC=i586-pc-msdosdjgpp-gcc
      - name: Make
        run: |
          make
          make DESTDIR=$(pwd)/output install-exec
      - name: Publish binary
        uses: softprops/action-gh-release@v2
        with:
          files: |
            output/xpar-dos*